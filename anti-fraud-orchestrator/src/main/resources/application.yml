server:
  port: 8081

spring:
  application:
    name: anti-fraud-orchestrator

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: anti-fraud-orchestrator

app:
  kafka:
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      transactions-created-topic: ${KAFKA_TRANSACTIONS_CREATED_TOPIC:transactions.created}
      consumer-group-id: ${KAFKA_CONSUMER_GROUP_ID:anti-fraud-orchestrator}
      auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET:earliest}
      retry:
        max-attempts: ${KAFKA_RETRY_MAX_ATTEMPTS:3}
        initial-interval-ms: ${KAFKA_RETRY_INITIAL_INTERVAL_MS:1000}
        multiplier: ${KAFKA_RETRY_MULTIPLIER:2.0}
        max-interval-ms: ${KAFKA_RETRY_MAX_INTERVAL_MS:10000}
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      transactions-scored-topic: ${KAFKA_TRANSACTIONS_SCORED_TOPIC:transactions.scored}
      acks: ${KAFKA_ACKS:all}
      enable-idempotence: ${KAFKA_ENABLE_IDEMPOTENCE:true}
  clients:
    feature-manager:
      base-url: ${FEATURE_MANAGER_BASE_URL:http://localhost:8082}
    inference-engine:
      base-url: ${INFERENCE_ENGINE_BASE_URL:http://localhost:8083}
