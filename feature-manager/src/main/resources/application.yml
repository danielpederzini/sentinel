spring:
  application:
    name: feature-manager
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/feature_manager}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  cache:
    type: caffeine
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

feature:
  cache:
    caffeine:
      maximum-size: 1000
      expire-after-write: 10m
      cache-names:
        - merchants
        - cards
        - users
        - trustedDevices
        - merchantsExists
        - cardsExists
        - usersExists
        - trustedDevicesExists
        - userAverageAmounts
    redis:
      time-to-last: 10m
