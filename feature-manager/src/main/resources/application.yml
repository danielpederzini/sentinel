spring:
  application:
    name: feature-manager
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  cache:
    type: caffeine

feature:
  cache:
    caffeine:
      maximum-size: 1000
      expire-after-write: 10m
      cache-names:
        - merchants
        - cards
        - users
        - trustedDevices
        - merchantsExists
        - cardsExists
        - usersExists
        - trustedDevicesExists
        - userAverageAmounts
    redis:
      time-to-last: 10m
