server:
  port: 8082

spring:
  application:
    name: feature-manager
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sentinel}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 60000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  cache:
    type: caffeine
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://localhost:8081/.well-known/jwks.json}

app:
  service-auth:
    issuer: ${SERVICE_AUTH_ISSUER:anti-fraud-orchestrator}
    audience: ${SERVICE_AUTH_AUDIENCE:sentinel-internal}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: feature-manager

feature:
  cache:
    caffeine:
      maximum-size: 1000
      expire-after-write: 10m
      cache-names:
        - merchants
        - cards
        - users
        - trustedDevices
        - merchantsExists
        - cardsExists
        - usersExists
        - trustedDevicesExists
        - userAverageAmounts
        - ipRiskScores
    redis:
      time-to-last: 10m
