server:
  port: 8084

spring:
  application:
    name: risk-action-handler
  mail:
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: risk-action-handler

app:
  kafka:
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      transactions-scored-topic: ${KAFKA_TRANSACTIONS_SCORED_TOPIC:transactions.scored}
      consumer-group-id: ${KAFKA_CONSUMER_GROUP_ID:risk-action-handler}
      auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET:earliest}
      retry:
        max-attempts: ${KAFKA_RETRY_MAX_ATTEMPTS:3}
        initial-interval-ms: ${KAFKA_RETRY_INITIAL_INTERVAL_MS:1000}
        multiplier: ${KAFKA_RETRY_MULTIPLIER:2.0}
        max-interval-ms: ${KAFKA_RETRY_MAX_INTERVAL_MS:10000}
  clients:
    email:
      destination-email: ${DESTINATION_EMAIL:}
    llm:
      base-url: ${LLM_BASE_URL:https://api.groq.com/openai/v1}
      api-key: ${LLM_API_KEY:}
      model: ${LLM_MODEL:llama-3.1-8b-instant}
      temperature: ${LLM_TEMPERATURE:0.2}
      max-completion-tokens: ${LLM_MAX_COMPLETION_TOKENS:512}
  notification:
    scheduler:
      max-attempts: ${NOTIFICATION_MAX_ATTEMPTS:5}
      base-delay-seconds: ${NOTIFICATION_BASE_DELAY_SECONDS:30}
      batch-size: ${NOTIFICATION_BATCH_SIZE:50}
      poll-interval-ms: ${NOTIFICATION_POLL_INTERVAL_MS:30000}
