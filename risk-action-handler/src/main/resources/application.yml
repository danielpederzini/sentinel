server:
  port: 8084

spring:
  application:
    name: risk-action-handler
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sentinel}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USERNAME:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  kafka:
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      transactions-scored-topic: ${KAFKA_TRANSACTIONS_SCORED_TOPIC:transactions.scored}
      consumer-group-id: ${KAFKA_CONSUMER_GROUP_ID:risk-action-handler}
      auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET:earliest}
  clients:
    email:
      destination-email: ${DESTINATION_EMAIL:}
    llm:
      base-url: ${LLM_BASE_URL:https://api.groq.com/openai/v1}
      api-key: ${LLM_API_KEY:}
      model: ${LLM_MODEL:llama-3.1-8b-instant}
      temperature: ${LLM_TEMPERATURE:0.2}
      max-completion-tokens: ${LLM_MAX_COMPLETION_TOKENS:512}
