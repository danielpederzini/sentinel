spring:
  application:
    name: transaction-ingestor

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: transaction-ingestor

app:
  kafka:
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      transactions-created-topic: ${KAFKA_TRANSACTIONS_CREATED_TOPIC:transactions.created}
      acks: ${KAFKA_ACKS:all}
      enable-idempotence: ${KAFKA_ENABLE_IDEMPOTENCE:true}
